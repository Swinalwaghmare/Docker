<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django App</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #f4efe6, #d7e7f5);
            font-family: Georgia, "Times New Roman", serif;
            color: #1d3557;
        }

        main {
            padding: 2.5rem;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 18px 50px rgba(29, 53, 87, 0.15);
            text-align: center;
        }

        h1 {
            margin-bottom: 0.75rem;
            font-size: clamp(2rem, 5vw, 3.5rem);
        }

        p {
            margin: 0;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Django app is running</h1>
        <p>Your container-ready starter project is set up.</p>
    </main>
</body>
</html>
